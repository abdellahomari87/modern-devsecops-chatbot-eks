name: DevSecOps CI/CD

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  id-token: write
  contents: read
  security-events: write

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: modern-devsecops-chatbot-eks
  ECR_REPOSITORY: modern-devsecops-chatbot

jobs:
  build-scan-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image variables
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "IMAGE_URI=$ACCOUNT_ID.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Run tests if available
        run: npm test --if-present

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Build Docker image
        run: docker build -t $IMAGE_URI .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_URI }}
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
          skip-dirs: /usr/local/lib/node_modules/npm

      - name: Push image to Amazon ECR
        if: github.event_name == 'push'
        run: docker push $IMAGE_URI

      - name: Install Cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@v3

      - name: Generate SBOM
        if: github.event_name == 'push'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_URI }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

      - name: Sign image with Cosign
        if: github.event_name == 'push'
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes $IMAGE_URI

      - name: Update Kubeconfig
        if: github.event_name == 'push'
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME

      - name: Wait for Kyverno to be ready
        if: github.event_name == 'push'
        run: |
          kubectl -n kyverno rollout status deployment/kyverno-admission-controller --timeout=180s
          kubectl -n kyverno rollout status deployment/kyverno-background-controller --timeout=180s
          kubectl -n kyverno rollout status deployment/kyverno-cleanup-controller --timeout=180s
          kubectl -n kyverno rollout status deployment/kyverno-reports-controller --timeout=180s

      - name: Refresh ECR secret for Kyverno image verification
        if: github.event_name == 'push'
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          kubectl create secret docker-registry ecr-registry-secret \
            --namespace kyverno \
            --docker-server=$ACCOUNT_ID.dkr.ecr.${AWS_REGION}.amazonaws.com \
            --docker-username=AWS \
            --docker-password="$(aws ecr get-login-password --region $AWS_REGION)" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kyverno policies
        if: github.event_name == 'push'
        run: |
          kubectl apply -f k8s/policies/security-policies.yaml
          kubectl apply -f k8s/policies/verify-image-signatures.yaml

      - name: Deploy to EKS
        if: github.event_name == 'push'
        run: |
          sed "s|IMAGE_PLACEHOLDER|$IMAGE_URI|g" k8s/all.yaml > k8s/rendered.yaml
          kubectl apply -f k8s/rendered.yaml
          kubectl rollout status deployment/chatbot-ui -n chatbot
